<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手写数字识别</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #eee;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
        canvas {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            cursor: crosshair;
            background: #000;
            touch-action: none;
        }
        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .btn-clear { background: #333; color: #ccc; }
        .btn-clear:hover { background: #444; }
        .btn-predict { background: linear-gradient(135deg, #e94560, #c23152); color: #fff; }
        .btn-predict:hover { box-shadow: 0 4px 15px rgba(233,69,96,0.4); }
        .btn-train { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.3); }
        .btn-train:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .digit-display {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #e94560, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .confidence { color: #aaa; font-size: 14px; }
        .bars {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 80px;
            width: 100%;
            max-width: 320px;
        }
        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .bar {
            width: 100%;
            background: #e94560;
            border-radius: 2px 2px 0 0;
            transition: height 0.3s;
            min-height: 2px;
        }
        .bar-label { font-size: 11px; color: #888; }
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-msg { font-size: 13px; color: #888; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>手写数字识别</h1>
        <p class="subtitle">在下方画布上写一个数字（0-9）</p>

        <canvas id="canvas" width="280" height="280"></canvas>

        <div class="btn-row">
            <button class="btn-clear" onclick="clearCanvas()">清除</button>
            <button class="btn-predict" onclick="predict()">识别</button>
            <button class="btn-train" onclick="startTraining()">训练模型</button>
        </div>

        <div class="result" id="result">
            <span style="color:#666;">画一个数字，然后点击"识别"</span>
        </div>
        <div class="status-msg" id="status"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let lastX = 0, lastY = 0;

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 280, 280);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 18;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        canvas.addEventListener('mousedown', e => {
            drawing = true;
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
        });
        canvas.addEventListener('mousemove', e => { if (drawing) drawLine(e); });
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseleave', () => drawing = false);
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            drawing = true;
            const pos = getTouchPos(e);
            lastX = pos.x; lastY = pos.y;
        });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (drawing) drawTouchLine(e); });
        canvas.addEventListener('touchend', () => drawing = false);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = 280 / rect.width;
            const scaleY = 280 / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = 280 / rect.width;
            const scaleY = 280 / rect.height;
            return {
                x: (touch.clientX - rect.left) * scaleX,
                y: (touch.clientY - rect.top) * scaleY
            };
        }

        function drawLine(e) {
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x; lastY = pos.y;
        }

        function drawTouchLine(e) {
            const pos = getTouchPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x; lastY = pos.y;
        }

        function clearCanvas() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 280, 280);
            document.getElementById('result').innerHTML = '<span style="color:#666;">画一个数字，然后点击"识别"</span>';
        }

        function getPixels() {
            // 缩小到 28x28
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 28;
            tempCanvas.height = 28;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0, 28, 28);
            const imgData = tempCtx.getImageData(0, 0, 28, 28);
            const pixels = new Array(784);
            for (let i = 0; i < 784; i++) {
                pixels[i] = imgData.data[i * 4] / 255.0; // 取 R 通道
            }
            return pixels;
        }

        async function predict() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="spinner" style="display:block;"></div>';

            try {
                const pixels = getPixels();
                const resp = await fetch('/api/mnist/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pixels)
                });
                const data = await resp.json();

                if (data.error) {
                    result.innerHTML = `<span style="color:#e94560;">${data.error}</span>`;
                    return;
                }

                result.innerHTML = `
                    <div class="digit-display">${data.digit}</div>
                    <div class="confidence">置信度: ${data.confidence}</div>
                    <div class="bars">
                        ${data.probabilities.map((p, i) => `
                            <div class="bar-wrapper">
                                <div class="bar" style="height:${p * 80}px; ${data.digit === i ? 'background:#e94560;' : 'background:#444;'}"></div>
                                <span class="bar-label" style="${data.digit === i ? 'color:#e94560;font-weight:bold;' : ''}">${i}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {
                result.innerHTML = `<span style="color:#e94560;">请求失败: ${e.message}</span>`;
            }
        }

        async function startTraining() {
            const statusEl = document.getElementById('status');
            const btn = document.querySelector('.btn-train');
            btn.disabled = true;
            btn.textContent = '训练中...';
            statusEl.textContent = '正在下载 MNIST 数据集并训练...';

            try {
                await fetch('/api/mnist/train?epochs=3&learningRate=0.01', { method: 'POST' });

                // 轮询状态
                const poll = setInterval(async () => {
                    const resp = await fetch('/api/mnist/status');
                    const data = await resp.json();
                    statusEl.textContent = data.status;
                    if (data.trained) {
                        clearInterval(poll);
                        btn.disabled = false;
                        btn.textContent = '重新训练';
                        statusEl.textContent = '训练完成！现在可以画数字进行识别了';
                    }
                }, 2000);
            } catch (e) {
                statusEl.textContent = '训练请求失败: ' + e.message;
                btn.disabled = false;
                btn.textContent = '训练模型';
            }
        }

        // 启动时查询状态
        (async () => {
            try {
                const resp = await fetch('/api/mnist/status');
                const data = await resp.json();
                document.getElementById('status').textContent = '模型状态: ' + data.status;
            } catch (e) { /* ignore */ }
        })();
    </script>
</body>
</html>
